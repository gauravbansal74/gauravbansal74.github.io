#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: atDesk - A Jekyll Knowledge Base Theme
description: atDesk is a simple to setup and use Jekyll theme for help desks and knowledge bases. Hosts for free on Github Pages!
baseurl:  # the subpath of your site, e.g. /support
url: https://www.atDesk.co # the base hostname AND PROTOCOL for your site, e.g. http://example.com
permalink: /:categories/:title

content_type: Knowledge Base #Define whether this is a knowledge base, help center, or something else
use_authors: true #Set this to false to disable showing post authors

brand_logo: logo.png
brand_name: https//www.atDesk.co
header: atDesk.co
subheader: Empowerment community through education 

meta_image: odin-meta.png

